<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Поток Кадров — Viora</title>
    <link rel="stylesheet" href="/static/styles_flow.css">
</head>

<body class="no-select">
    <a class="back-link" href="/">← Назад</a>
    <button class="open-panel-btn" id="openPanelBtn">Открыть ИИ</button>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn" title="Увеличить">+</button>
        <button class="zoom-btn" id="zoomOut" title="Уменьшить">−</button>
        <button class="zoom-btn" id="resetZoom" title="Сбросить масштаб">↺</button>
        <div class="zoom-display" id="zoomLevel">100%</div>
    </div>

    <div class="editor-page" id="editorPage">
        <div class="canvas-area canvas-pan-cursor" id="canvasArea">
            <div class="canvas-container" id="canvasContainer">
                <div class="canvas-transform" id="canvasTransform">
                    <div class="canvas-content" id="canvasContent">
                        <svg class="connector-svg" id="connectors"></svg>

                        <div class="node" id="node-root" style="left: calc(50% - 110px); top: 80px;" data-id="root" data-type="frame">
                            <div contenteditable class="title" data-placeholder="Опишите сцену...">Начните с первого кадра</div>
                            <div class="controls">
                                <div class="small-muted">Начальный кадр</div>
                                <div class="buttons-container">
                                    <div class="add-btn" title="Добавить кадр" data-add>+</div>
                                    <div class="next-frame-btn" title="Следующий кадр (ИИ)" data-next-frame>→</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="side-panel" id="sidePanel" role="region" aria-label="ИИ-панель">
            <div class="side-header" id="sideHeader">
                <div>
                    <div class="side-title">Режиссер ИИ</div>
                    <div class="small-muted">Анализ и генерация кадров</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center">
                    <button id="panelCloseBtn" class="button-ghost" title="Скрыть панель">✕</button>
                </div>
            </div>

            <div style="font-weight:600">Тема сцены</div>
            <div id="ai-title" class="small-muted" style="min-height:34px">—</div>

            <div style="height:10px"></div>
            <div style="font-weight:600">Текущие кадры</div>
            <div id="ai-outcomes" class="small-muted" style="min-height:60px">—</div>

            <div style="height:12px"></div>
            <div class="ai-box" id="ai-output">Используйте кнопки для добавления кадров или анализа сцены.</div>

            <div class="action-row" style="margin-top:12px">
                <button class="button-primary" id="ai-next-frame">Следующий кадр (ИИ)</button>
                <button class="button-special" id="ai-analyze-frames">Анализ кадров</button>
            </div>

            <div style="height:8px"></div>
            <div class="small-muted">Таймер блокировки: <span id="ai-timer">—</span></div>
        </div>
    </div>

    <div class="frame-analysis-modal" id="frameAnalysisModal">
        <div class="frame-analysis-content">
            <div style="font-weight:600;font-size:18px;margin-bottom:15px;">Выбор кадров для анализа</div>
            <div class="small-muted" style="margin-bottom:15px;">Выберите кадры для сравнения и анализа:</div>

            <div class="frame-list" id="frameList">

            </div>

            <div class="action-row" style="margin-top:20px;">
                <button class="button-ghost" id="modalCancel">Отмена</button>
                <button class="button-special" id="modalAnalyze">Анализировать</button>
            </div>
        </div>
    </div>

<script src="/static/scripts/flow.js"></script>
</body>
</html>
